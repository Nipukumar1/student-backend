<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | InfinityStore</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --accent: #e84c1e; --ink: #0f0f0f; --paper: #fafaf7; --muted: #6b6b6b; --border: #e0ddd8; }
        body { font-family: 'DM Sans', sans-serif; background: var(--ink); min-height: 100vh; padding: 40px 20px; }
        .top-bar { text-align: center; margin-bottom: 40px; }
        .logo-link { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; color: white; text-decoration: none; }
        .logo-link span { color: var(--accent); }
        h1 { font-family: 'Syne', sans-serif; color: white; font-size: 20px; font-weight: 600; margin-top: 8px; opacity: 0.6; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; max-width: 1100px; margin: 0 auto; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
        .card { background: var(--paper); border-radius: 24px; padding: 32px; }
        .card h2 { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; color: var(--ink); margin-bottom: 28px; display: flex; align-items: center; gap: 10px; }
        .card h2 i { color: var(--accent); }
        .field { margin-bottom: 18px; }
        .field label { display: block; font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
        .field input, .field textarea, .field select {
            width: 100%; padding: 13px 16px;
            border: 2px solid var(--border); border-radius: 12px;
            font-size: 15px; font-family: 'DM Sans', sans-serif;
            background: white; outline: none; transition: border-color 0.2s;
        }
        .field input:focus, .field textarea:focus { border-color: var(--accent); }
        .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .order-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); gap: 12px; }
        .item-img { width: 54px; height: 54px; border-radius: 10px; overflow: hidden; flex-shrink: 0; }
        .item-img img { width: 100%; height: 100%; object-fit: cover; }
        .item-info { flex: 1; }
        .item-info strong { font-size: 14px; color: var(--ink); }
        .item-info small { display: block; color: var(--muted); font-size: 12px; }
        .item-price { font-weight: 700; color: var(--ink); font-size: 15px; }
        .totals { margin-top: 20px; }
        .total-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 14px; color: var(--muted); }
        .total-row.grand { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; color: var(--accent); padding-top: 16px; border-top: 2px solid var(--border); }
        .pay-option { display: flex; align-items: center; gap: 12px; padding: 14px; border: 2px solid var(--border); border-radius: 14px; margin-bottom: 10px; cursor: pointer; transition: border-color 0.2s; }
        .pay-option.active { border-color: var(--accent); background: #fff6f4; }
        .pay-option label { cursor: pointer; font-weight: 500; font-size: 15px; }
        .place-btn {
            width: 100%; padding: 16px;
            background: var(--accent); color: white; border: none;
            border-radius: 16px; font-size: 17px; font-weight: 700;
            font-family: 'Syne', sans-serif; cursor: pointer; margin-top: 20px;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .place-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(232,76,30,0.4); }
        .place-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .back-link { display: block; text-align: center; margin: 28px auto 0; color: white; opacity: 0.5; cursor: pointer; font-size: 14px; }
        .back-link:hover { opacity: 1; }
        .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: var(--ink); color: white; padding: 12px 28px; border-radius: 60px; font-size: 14px; opacity: 0; transition: opacity 0.2s; z-index: 99; border: 1px solid #333; }
        .items-scroll { max-height: 280px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="top-bar">
        <a class="logo-link" href="dashboard.html">Infinity<span>Store</span></a>
        <h1>Secure Checkout</h1>
    </div>
    <div class="grid">
        <!-- Delivery Form -->
        <div class="card">
            <h2><i class="fas fa-map-marker-alt"></i> Delivery Details</h2>
            <div class="field"><label>Full Name *</label><input type="text" id="fullName" placeholder="Ramesh Kumar"></div>
            <div class="field"><label>Email *</label><input type="email" id="email" placeholder="ramesh@example.com"></div>
            <div class="field"><label>Phone *</label><input type="tel" id="phone" placeholder="9876543210"></div>
            <div class="field"><label>Address *</label><textarea id="address" rows="3" placeholder="House No., Street, Area..."></textarea></div>
            <div class="row2">
                <div class="field"><label>City *</label><input type="text" id="city"></div>
                <div class="field"><label>Pincode *</label><input type="text" id="pincode" maxlength="6"></div>
            </div>
            <div class="row2">
                <div class="field"><label>State *</label><input type="text" id="state"></div>
                <div class="field"><label>Country</label><input type="text" id="country" value="India"></div>
            </div>
        </div>
        <!-- Order Summary + Payment -->
        <div class="card">
            <h2><i class="fas fa-shopping-bag"></i> Order Summary</h2>
            <div class="items-scroll" id="orderItems"></div>
            <div class="totals">
                <div class="total-row"><span>Subtotal</span><span id="subtotalDisplay">₹0</span></div>
                <div class="total-row"><span>GST (18%)</span><span id="gstDisplay">₹0</span></div>
                <div class="total-row"><span>Shipping</span><span style="color:#16a34a;">FREE</span></div>
                <div class="total-row grand"><span>Total</span><span id="totalDisplay">₹0</span></div>
            </div>
            <div style="margin-top: 24px;">
                <p style="font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); margin-bottom:12px;">Payment Method</p>
                <div class="pay-option active" data-method="Cash on Delivery">
                    <input type="radio" name="pay" value="Cash on Delivery" checked> <label>💰 Cash on Delivery</label>
                </div>
                <div class="pay-option" data-method="Credit/Debit Card">
                    <input type="radio" name="pay" value="Credit/Debit Card"> <label>💳 Credit / Debit Card</label>
                </div>
                <div class="pay-option" data-method="UPI">
                    <input type="radio" name="pay" value="UPI"> <label>📱 UPI / GPay / PhonePe</label>
                </div>
            </div>
            <button class="place-btn" id="placeBtn">
                <i class="fas fa-check-circle"></i> Place Order
            </button>
        </div>
    </div>
    <a class="back-link" href="dashboard.html"><i class="fas fa-arrow-left"></i> Back to Shopping</a>
    <div class="toast" id="toast"></div>

    <script>
        const API = 'https://student-backend-detj.onrender.com';
        const token = localStorage.getItem('token');
        if (!localStorage.getItem('isLoggedIn')) window.location.href = 'index.html';

        let cart = JSON.parse(localStorage.getItem('cartItems')) || [];

        // Prefill
        document.getElementById('fullName').value = localStorage.getItem('userName') || '';
        document.getElementById('email').value = localStorage.getItem('userEmail') || '';

        function toast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 2500);
        }

        function renderSummary() {
            const container = document.getElementById('orderItems');
            if (!cart.length) { container.innerHTML = '<p style="text-align:center;padding:20px;color:#999">Cart is empty</p>'; return; }

            container.innerHTML = cart.map(item => `
                <div class="order-item">
                    <div class="item-img"><img src="${item.icon}" onerror="this.src='https://via.placeholder.com/54'"></div>
                    <div class="item-info"><strong>${item.name}</strong><small>Qty: ${item.qty}</small></div>
                    <div class="item-price">₹${(item.price * item.qty).toLocaleString('en-IN')}</div>
                </div>
            `).join('');

            const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
            const gst = Math.round(subtotal * 0.18);
            const total = subtotal + gst;
            document.getElementById('subtotalDisplay').textContent = '₹' + subtotal.toLocaleString('en-IN');
            document.getElementById('gstDisplay').textContent = '₹' + gst.toLocaleString('en-IN');
            document.getElementById('totalDisplay').textContent = '₹' + total.toLocaleString('en-IN');
        }

        // Payment selection
        document.querySelectorAll('.pay-option').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('.pay-option').forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
                opt.querySelector('input').checked = true;
            });
        });

        document.getElementById('placeBtn').addEventListener('click', async () => {
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const address = document.getElementById('address').value.trim();
            const city = document.getElementById('city').value.trim();
            const pincode = document.getElementById('pincode').value.trim();
            const state = document.getElementById('state').value.trim();
            const country = document.getElementById('country').value.trim();
            const paymentMethod = document.querySelector('input[name="pay"]:checked').value;

            if (!fullName || !email || !phone || !address || !city || !pincode || !state) {
                toast('❌ Please fill all required fields'); return;
            }
            if (!cart.length) { toast('❌ Your cart is empty'); return; }

            const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
            const gst = Math.round(subtotal * 0.18);
            const total = subtotal + gst;

            const btn = document.getElementById('placeBtn');
            btn.disabled = true; btn.textContent = 'Placing order...';

            try {
                const res = await fetch(`${API}/api/orders`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({
                        customerName: fullName, customerEmail: email, customerPhone: phone,
                        customerAddress: address, city, state, pincode, country,
                        items: cart.map(i => ({ productId: i.id, name: i.name, price: i.price, qty: i.qty, image: i.icon })),
                        subtotal, gst, total, paymentMethod
                    })
                });
                const data = await res.json();
                if (!res.ok) { toast('❌ ' + (data.message || 'Order failed')); btn.disabled = false; btn.innerHTML = '<i class="fas fa-check-circle"></i> Place Order'; return; }

                localStorage.setItem('lastOrder', JSON.stringify(data.order));
                localStorage.removeItem('cartItems');
                toast('✅ Order placed! Redirecting...');
                setTimeout(() => window.location.href = 'order-success.html', 1200);
            } catch (err) {
                toast('❌ Server error. Try again.'); btn.disabled = false; btn.innerHTML = '<i class="fas fa-check-circle"></i> Place Order';
            }
        });

        renderSummary();
    </script>
</body>
</html>
