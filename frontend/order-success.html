<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed | InfinityStore</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: #0f0f0f; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        .card { background: white; border-radius: 28px; max-width: 640px; width: 100%; padding: 48px 40px; text-align: center; animation: up 0.5s ease; }
        @keyframes up { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .icon-ring { width: 90px; height: 90px; border-radius: 50%; background: #16a34a; display: flex; align-items: center; justify-content: center; margin: 0 auto 28px; animation: pop 0.6s ease; }
        @keyframes pop { 0% { transform: scale(0); } 70% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .icon-ring i { font-size: 44px; color: white; }
        h1 { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; margin-bottom: 8px; }
        .sub { color: #666; margin-bottom: 32px; }
        .oid { background: #f5f5f0; padding: 14px; border-radius: 14px; font-family: monospace; font-size: 18px; font-weight: 700; color: #e84c1e; margin-bottom: 24px; }
        .info-box { background: #fafaf7; border-radius: 18px; padding: 20px; text-align: left; margin-bottom: 16px; }
        .info-box h3 { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
        .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 14px; }
        .row:last-child { border: none; }
        .row.grand { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; color: #e84c1e; padding-top: 14px; }
        .delivery-note { background: #fef3c7; border-radius: 14px; padding: 14px; font-size: 14px; margin-bottom: 28px; }
        .btns { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
        .btn { padding: 13px 28px; border-radius: 40px; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; border: none; transition: transform 0.15s; }
        .btn:hover { transform: translateY(-2px); }
        .btn-primary { background: #0f0f0f; color: white; }
        .btn-outline { background: white; color: #0f0f0f; border: 2px solid #0f0f0f; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon-ring"><i class="fas fa-check"></i></div>
        <h1>🎉 Order Confirmed!</h1>
        <p class="sub">Thank you for shopping with InfinityStore</p>
        <div id="orderContent"></div>
        <div class="delivery-note"><i class="fas fa-truck"></i> Your order will be delivered within <strong>3–5 business days</strong></div>
        <div class="btns">
            <button class="btn btn-primary" onclick="window.location.href='dashboard.html'"><i class="fas fa-shopping-cart"></i> Continue Shopping</button>
            <button class="btn btn-outline" id="trackBtn"><i class="fas fa-truck"></i> Track Orders</button>
        </div>
    </div>

    <script>
        const order = JSON.parse(localStorage.getItem('lastOrder') || 'null');
        const container = document.getElementById('orderContent');

        if (order) {
            const subtotal = order.subtotal || order.items.reduce((s,i) => s + i.price*i.qty, 0);
            const gst = order.gst || Math.round(subtotal * 0.18);
            container.innerHTML = `
                <div class="oid"><i class="fas fa-receipt"></i> Order # ${order.orderId}</div>
                <div class="info-box">
                    <h3><i class="fas fa-user"></i> Delivery Info</h3>
                    <div class="row"><span><strong>${order.customerName}</strong></span><span>📞 ${order.customerPhone}</span></div>
                    <div class="row"><span>📧 ${order.customerEmail}</span></div>
                    <div class="row"><span>📍 ${order.customerAddress}, ${order.city}, ${order.state} - ${order.pincode}</span></div>
                </div>
                <div class="info-box">
                    <h3><i class="fas fa-box"></i> ${order.items.length} Item(s)</h3>
                    ${order.items.map(i => `<div class="row"><span>${i.name} × ${i.qty}</span><span>₹${(i.price*i.qty).toLocaleString('en-IN')}</span></div>`).join('')}
                    <div class="row"><span>Subtotal</span><span>₹${subtotal.toLocaleString('en-IN')}</span></div>
                    <div class="row"><span>GST (18%)</span><span>₹${gst.toLocaleString('en-IN')}</span></div>
                    <div class="row grand"><span>Grand Total</span><span>₹${order.total.toLocaleString('en-IN')}</span></div>
                </div>
            `;
        } else {
            container.innerHTML = '<div style="padding:20px;color:#999;text-align:center;">No order details found</div>';
        }

        document.getElementById('trackBtn').addEventListener('click', () => {
            localStorage.setItem('openOrdersModal', 'true');
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
